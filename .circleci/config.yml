version: 2.1

jobs:
  test:
    docker:
      - image: cimg/python:3.12
    working_directory: ~/project
    steps:
      - checkout
      - run:
          name: Show Python version
          command: python --version
      - run:
          name: Run unit tests
          command: python -m unittest discover -s tests -v

workflows:
  test-project:
    jobs:
      - test
